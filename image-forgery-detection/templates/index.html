
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Forgery Detection</title>
    <!-- Link to Bootstrap CSS for a responsive layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f8ff;
        }
        .container {
            max-width: 600px;
            margin-top: 50px;
        }
        .header {
            text-align: center;
            color: #333;
        }
        .btn-custom {
            background-color: #4CAF50;
            color: white;
        }
        .image-preview {
            width: 100%;
            height: auto;
            margin-top: 20px;
            border-radius: 8px;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <img src="/Users/yesh/Documents/image-forgery-detection/imageforgery.png" class="img-fluid" alt="Forgery Detection Banner">
 ⁠


    <div class="container">
        <div class="header">
            <h1>Image Forgery Detection</h1>
            <p class="lead">Upload a JPEG image to check if it has been tampered with.</p>
        </div>

        <form action="/predict" method="post" enctype="multipart/form-data" class="text-center">
            <div class="form-group">
                <input type="file" name="image" accept=".jpg, .jpeg" class="form-control mb-4" required>
            </div>
            <button type="submit" class="btn btn-custom btn-lg">Analyze Image</button>
        </form>

        <div class="footer">
            <p>&copy; 2025 Image Forgery Detection. All rights reserved.</p>
        </div>
    </div>

    <!-- Include Bootstrap JS for functionality -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
