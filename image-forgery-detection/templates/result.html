
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgery Detection Result</title>
    <!-- Link to Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f8ff;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .result-header {
            text-align: center;
            color: #333;
        }
        .result-image {
            width: 100%;
            height: auto;
            margin-top: 20px;
            border-radius: 8px;
        }
        .result-text {
            text-align: center;
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="result-header">
            <h2>Forgery Detection Result</h2>
        </div>

        <div class="result-text">
            <p>Prediction: <span class="badge bg-{{ 'success' if result == 'Authentic' else 'danger' }}">{{ result }}</span></p>
        </div>

        <div class="text-center">
            <h4>ELA Image</h4>
            <img src="{{ url_for('static', filename='ela_image.jpg') }}" class="result-image" alt="ELA Image">
        </div>

        <div class="footer">
            <p>&copy; 2025 Image Forgery Detection. All rights reserved.</p>
        </div>
    </div>

    <!-- Include Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
